name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Run unit tests
        run: |
          source .venv/bin/activate
          pytest tests -q

      - name: Smoke CLI help commands
        run: |
          source .venv/bin/activate
          python -m hcesvm.ordinal_cli --help
          python -m hcesvm.skill_1000_baselines_runner --help

      - name: Check whitespace in changed source files
        env:
          BEFORE_SHA: ${{ github.event.before || '' }}
        run: |
          set -euo pipefail

          paths=(src tests scripts examples pyproject.toml uv.lock)

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            git fetch --no-tags --depth=1 origin "${GITHUB_BASE_REF}"
            git diff --check "origin/${GITHUB_BASE_REF}...HEAD" -- "${paths[@]}"
          elif [[ -n "${BEFORE_SHA}" && "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            git diff --check "${BEFORE_SHA}" "${GITHUB_SHA}" -- "${paths[@]}"
          else
            git diff --check -- "${paths[@]}"
          fi
